<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍦 RobGlace</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#1b1f2a;
    color:white;
}

header{
    background:#00a2ff;
    padding:25px;
    text-align:center;
}

h1{
    margin:0;
    font-size:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:#2d3446;
    width:260px;
    border-radius:15px;
    text-align:center;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card:hover{
    transform:scale(1.05);
    transition:.3s;
}

.price{
    font-size:28px;
    color:#00ff7f;
}

button{
    background:#00b06f;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#00d683;
}

.review{
    background:#2d3446;
    width:80%;
    margin:auto;
    padding:20px;
    border-radius:15px;
    margin-bottom:50px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

textarea{
    height:100px;
}

footer{
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
<h1>🍦 RobGlace</h1>
<p>Choisis ta glace préférée !</p>
</header>

<div class="container">

<div class="card">
<h2>🍦 Petite</h2>
<p class="price">5 Robux</p>
<button>Acheter</button>
</div>

<div class="card">
<h2>🍦 Moyenne</h2>
<p class="price">15 Robux</p>
<button>Acheter</button>
</div>

<div class="card">
<h2>🍦 Grande</h2>
<p class="price">45 Robux</p>
<button>Acheter</button>
</div>

</div>

<div class="review">

<h2>⭐ Laisse ton avis</h2>

<input type="text" placeholder="Ton pseudo">

<textarea placeholder="Écris ton avis..."></textarea>

<br><br>

<button onclick="alert('Merci pour ton avis !')">Envoyer</button>

</div>

<footer>
© 2026 RobGlace
</footer>

</body>
</html>
