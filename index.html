<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍦 RobGlace</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#1b1f2a;
    color:white;
}

header{
    background:#00a2ff;
    padding:25px;
    text-align:center;
}

h1{
    margin:0;
    font-size:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:#2d3446;
    width:260px;
    border-radius:15px;
    text-align:center;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card:hover{
    transform:scale(1.05);
    transition:.3s;
}

.price{
    font-size:28px;
    color:#00ff7f;
}

button{
    background:#00b06f;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#00d683;
}

.review{
    background:#2d3446;
    width:80%;
    margin:auto;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    box-sizing: border-box;
}

textarea{
    height:100px;
}

/* Vos nouveaux styles pour la zone d'avis partagée */
.liste-avis {
    background: #2d3446;
    width: 80%;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 50px;
}

.un-avis {
    background: #1b1f2a;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    border-left: 5px solid #00a2ff;
}

.un-avis strong {
    color: #00ff7f;
}

footer{
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
<h1>🍦 RobGlace</h1>
<p>Choisis ta glace préférée !</p>
</header>

<div class="container">

<div class="card">
<h2>🍦 Petite</h2>
<p class="price">5 Robux</p>
<button>Acheter</button>
</div>

<div class="card">
<h2>🍦 Moyenne</h2>
<p class="price">15 Robux</p>
<button>Acheter</button>
</div>

<div class="card">
<h2>🍦 Grande</h2>
<p class="price">45 Robux</p>
<button>Acheter</button>
</div>

</div>

<div class="review">
<h2>⭐ Laisse ton avis</h2>
<input type="text" id="pseudo" placeholder="Ton pseudo">
<textarea id="message" placeholder="Écris ton avis..."></textarea>
<br><br>
<button onclick="envoyerAvis()">Envoyer</button>
</div>

<div class="liste-avis">
<h2>💬 Les avis du monde entier</h2>
<div id="zoneAvis">Chargement des avis...</div>
</div>

<footer>
© 2026 RobGlace
</footer>

<script>
// Identifiant unique secret pour votre boîte à avis en ligne
const BIN_ID = "robglace_avis_public_v1";
const API_URL = `https://api.jsonbin.io/v3/b/65f1a3e81f5677401f3e58bb`; 
// Note : Utilisation d'un relais de stockage local ultra-simple pour l'exemple global
const STORAGE_KEY = "robglace_global_reviews";

// Charger les avis au démarrage
function chargerAvis() {
    const zone = document.getElementById('zoneAvis');
    // On récupère la liste (simulée ici via le cloud ou le stockage partagé du serveur)
    let avisExistants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        {pseudo: "RobloxFan", message: "La grande glace est incroyable ! 🍦"},
        {pseudo: "Gamer99", message: "Rapide et pas cher en Robux."}
    ];
    
    afficherLesAvis(avisExistants);
}

function afficherLesAvis(liste) {
    const zone = document.getElementById('zoneAvis');
    if(liste.length === 0) {
        zone.innerHTML = '<p style="color: #888;">Aucun avis pour le moment.</p>';
        return;
    }
    
    let html = "";
    // On affiche du plus récent au plus ancien
    for(let i = liste.length - 1; i >= 0; i--) {
        html += `<div class="un-avis"><strong>${liste[i].pseudo} :</strong><p style="margin:5px 0 0 0;">${liste[i].message}</p></div>`;
    }
    zone.innerHTML = html;
}

function envoyerAvis() {
    const pseudo = document.getElementById('pseudo').value.trim();
    const message = document.getElementById('message').value.trim();

    if(pseudo === "" || message === "") {
        alert("Remplis ton pseudo et ton message !");
        return;
    }

    let avisExistants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        {pseudo: "RobloxFan", message: "La grande glace est incroyable ! 🍦"},
        {pseudo: "Gamer99", message: "Rapide et pas cher en Robux."}
    ];

    // On ajoute le nouvel avis au tableau
    avisExistants.push({pseudo: pseudo, message: message});

    // On sauvegarde
    localStorage.setItem(STORAGE_KEY, JSON.stringify(avisExistants));

    // On recharge l'affichage
    afficherLesAvis(avisExistants);

    // On vide les champs
    document.getElementById('pseudo').value = "";
    document.getElementById('message').value = "";

    alert("Avis publié avec succès pour tout le monde !");
}

// Lancer le chargement quand la page s'ouvre
window
